<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="55%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.28" cy="0.45" r="0.6">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#141824" stroke-width="1"/>
    </pattern>
    <clipPath id="typewriter">
      <rect x="84" y="196" width="0" height="36">
        <animate attributeName="width" from="0" to="980" begin="0.6s" dur="2.8s" fill="freeze"
                 calcMode="discrete"
                 values="0;13;26;39;52;65;78;91;104;117;130;143;156;169;182;195;208;221;234;247;260;273;286;299;312;325;338;351;364;377;390;403;416;429;442;455;468;481;494;507;520;533;546;559;572;585;598;611;624;637;650;663;676;689;702;715;728;741;754;767;780;793;806;819;832;845;858;871;884;897;910;923;936;949;962;980"/>
      </rect>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="1200" height="320" rx="14" fill="#05070d"/>
  <rect width="1200" height="320" rx="14" fill="url(#grid)"/>
  <rect width="1200" height="320" rx="14" fill="url(#glow)"/>
  <rect x="0.5" y="0.5" width="1199" height="319" rx="13.5" stroke="#1c2233" stroke-width="1"/>

  <!-- omega watermark -->
  <text x="1005" y="248" font-family="Georgia, 'Times New Roman', serif" font-size="260"
        fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.14">&#937;</text>

  <!-- status chip -->
  <circle cx="92" cy="70" r="5" fill="#34d399">
    <animate attributeName="opacity" values="1;0.25;1" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="108" y="75" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="14" letter-spacing="2" fill="#34d399">SYSTEM ONLINE — BUILDING OMIUM</text>
  <text x="1108" y="75" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="13" fill="#4b5563" text-anchor="end">SAN FRANCISCO · UTC-7</text>

  <!-- name -->
  <text x="80" y="164" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="88" font-weight="800" letter-spacing="10" fill="url(#accent)">ANURAG</text>

  <!-- typed line -->
  <g clip-path="url(#typewriter)">
    <text x="84" y="222" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
          font-size="21" fill="#8b95a7">&gt; co-founder @ omium — self-healing infrastructure for AI agents</text>
  </g>
  <rect x="920" y="204" width="11" height="24" fill="#22d3ee" opacity="0">
    <animate attributeName="opacity" values="0;1;0" begin="3.4s" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom line -->
  <text x="84" y="278" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace"
        font-size="14" letter-spacing="1" fill="#3d4657">detect &#8594; diagnose &#8594; recover &#8594; learn &#8594; repeat</text>
</svg>
